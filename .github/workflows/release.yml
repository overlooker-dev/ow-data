# Triggered on tag push (v*). Publishes:
#   - npm package to GitHub Packages (@lunavod/ow-data)
#   - Python wheel attached to the GitHub Release
# Version is taken from the tag and synced into package.json + pyproject.toml
# at CI time, so humans only need to tag correctly.

name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22" # required for --experimental-strip-types in validate script
          registry-url: "https://npm.pkg.github.com"
          scope: "@lunavod"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Extract version from tag
        id: version
        run: echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Install npm deps
        run: npm ci

      - name: Validate data
        run: npm run validate

      - name: Sync version into manifests
        run: |
          npm version --no-git-tag-version --allow-same-version "${{ steps.version.outputs.value }}"
          python - <<'PY'
          import os, re, pathlib
          version = os.environ["VERSION"]
          p = pathlib.Path("pyproject.toml")
          text = p.read_text(encoding="utf-8")
          new = re.sub(r'^version = "[^"]+"', f'version = "{version}"', text, count=1, flags=re.MULTILINE)
          if new == text:
              raise SystemExit("failed to rewrite version in pyproject.toml")
          p.write_text(new, encoding="utf-8")
          PY
        env:
          VERSION: ${{ steps.version.outputs.value }}

      - name: Build npm package
        run: npm run build

      - name: Publish npm package
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Python wheel
        run: |
          python -m pip install --upgrade build
          # Write wheel to a separate dir so it doesn't collide with TS dist/.
          python -m build --wheel --outdir python-dist

      - name: Attach wheel to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: python-dist/*.whl
          generate_release_notes: true
